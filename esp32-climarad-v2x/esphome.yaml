substitutions:
  id_prefix: climarad_sensa_v2x
  name_prefix: "ClimaRad Sensa V2X"

esphome:
  name: climarad-sensa-v2x-modbus
  friendly_name: "Climarad Sensa V2X"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

logger:
  level: INFO

# sync time with home assistant
time:
  - platform: homeassistant
    id: homeassistant_time

api:

ota:
  - platform: esphome

ethernet:
  type: W5500
  clk_pin: GPIO13
  mosi_pin: GPIO11
  miso_pin: GPIO12
  cs_pin: GPIO14
  interrupt_pin: GPIO10
  reset_pin: GPIO9

uart:
  id: uart_modbus
  tx_pin: GPIO17  # pin 34
  rx_pin: GPIO21  # pin 35
  baud_rate: 9600
  stop_bits: 1
  parity: EVEN

modbus:
  id: climarad_modbus
  role: client
  send_wait_time: 500ms

modbus_controller:
  - id: climarad_sensa_v2x
    modbus_id: climarad_modbus
    address: 000  # TODO: Modbus Slave ID is written on Climarad Modbus module cable
    update_interval: 60s
    command_throttle: 500ms

sensor:
  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} CO2"
    id: "${id_prefix}_co2"
    register_type: read
    address: 0x0000
    value_type: S_WORD
    state_class: measurement
    device_class: carbon_dioxide
    unit_of_measurement: ppm
    filters:
      - filter_out: 32767 # specific value which climarad use during manual modes
      - filter_out: 0
      - clamp:
          min_value: 1
          max_value: 5000
          ignore_out_of_range: true

  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Humidity"
    id: "${id_prefix}_humidity"
    register_type: read
    address: 0x0002
    value_type: S_WORD
    state_class: measurement
    device_class: humidity
    unit_of_measurement: '%'
    filters:
      - multiply: 0.1
      - clamp:
          min_value: 0.0
          max_value: 100.0
          ignore_out_of_range: true
    accuracy_decimals: 1

  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Temperature"
    id: "${id_prefix}_temperature"
    register_type: read
    address: 0x0004
    value_type: S_WORD
    state_class: measurement
    device_class: temperature
    unit_of_measurement: '°C'
    filters:
      - multiply: 0.01
      - clamp:
          min_value: -50.00
          max_value: 50.00
          ignore_out_of_range: true
    accuracy_decimals: 2

    ######################
    # Diagnostic sensors #
    ######################

  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Desired CO2"
    id: "${id_prefix}_desired_co2"
    register_type: read
    address: 0x0001
    value_type: S_WORD
    state_class: measurement
    device_class: carbon_dioxide
    unit_of_measurement: ppm
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Fan Speed Air Supply"
    id: "${id_prefix}_fan_speed_air_supply"
    register_type: read
    address: 0x000B
    value_type: U_WORD
    state_class: measurement
    unit_of_measurement: rpm
    entity_category: diagnostic
    filters:
      - clamp:
          min_value: 0
          max_value: 5000
          ignore_out_of_range: true

  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Fan Speed Air Exhaust"
    id: "${id_prefix}_fan_speed_air_exhaust"
    register_type: read
    address: 0x000C
    value_type: U_WORD
    state_class: measurement
    unit_of_measurement: rpm
    entity_category: diagnostic
    filters:
      - clamp:
          min_value: 0
          max_value: 5000
          ignore_out_of_range: true

  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Number of Times Filter Counter Reset"
    id: "${id_prefix}_number_of_times_filter_counter_reset"
    register_type: read
    address: 0x000D
    value_type: U_WORD
    state_class: measurement
    entity_category: diagnostic

text_sensor:
  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Current Mode"
    id: "${id_prefix}_current_mode"
    register_type: read
    address: 0x0005
    entity_category: diagnostic
    raw_encode: HEXBYTES
    lambda: |-
      uint16_t value = modbus_controller::word_from_hex_str(x, 0);
      switch (value) {
        case 0: return std::string("Auto");
        case 1: return std::string("Pause");
        case 2: return std::string("High");
        case 3: return std::string("Maximal");
        case 4: return std::string("Summer night");
        case 5: return std::string("5-position ventilation");
        case 6: return std::string("5-position recirculation");
        default: return std::string("Unknown");
      }

  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Error"
    id: "${id_prefix}_error"
    register_type: read
    address: 0x000F
    entity_category: diagnostic
    raw_encode: HEXBYTES
    lambda: |-
      uint16_t value = modbus_controller::word_from_hex_str(x, 0);

      std::string result;
      if (value & 1)
        result += "Outside Temperature,";
      if (value & 2)
        result += "Inside Temperature,";
      if (value & 4)
        result += "Air Quality,";
      if (value & 8)
        result += "Humidity,";
      if (value & 16)
        result += "Supply Fan,";
      if (value & 32)
        result += "Exhaust Fan,";
      if (value & 64)
        result += "Power Supply Fan,";
      if (value & 128)
        result += "Fan Speed,";
      if (value & 256)
        result += "RF,";
      if (value & 512)
        result += "RF Sensor,";

      if (result.ends_with(','))
        result.pop_back();

      return result.empty() ? "None" : result;

select:
  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Desired CO2 Level"
    id: "${id_prefix}_desired_co2_level"
    address: 0x101D
    value_type: U_WORD
    optionsmap:
      "1200PPM": 0
      "1000PPM": 1
      "800PPM": 2
      "600PPM": 3
      "400PPM": 4
    entity_category: config

  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Desired Mode"
    id: "${id_prefix}_desired_mode"
    address: 0x1005
    value_type: U_WORD
    optionsmap:
      "Auto": 0
      "Pause": 1
      "High": 2
      "Maximal": 3
      "Summer night": 4
      "5-position ventilation": 5
      "5-position recirculation": 6
    entity_category: config

  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Child Lock"
    id: "${id_prefix}_child_lock"
    address: 0x1026
    value_type: U_WORD
    optionsmap:
      "Off": 0
      "On": 1
    entity_category: config

  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} Window Ventilation"
    id: "${id_prefix}_window_ventilation"
    address: 0x103E
    value_type: U_WORD
    optionsmap:
      "Absent": 0
      "Present": 1
    entity_category: config

number:
  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} CO2 Compensation"
    id: "${id_prefix}_co2_compensation"
    register_type: holding
    address: 0x1000
    value_type: S_WORD
    entity_category: config
    unit_of_measurement: ppm
    device_class: carbon_dioxide
    mode: box

  - platform: modbus_controller
    modbus_controller_id: climarad_sensa_v2x
    name: "${name_prefix} LED Brightness"
    id: "${id_prefix}_led_brightness"
    register_type: holding
    address: 0x1027
    value_type: U_WORD
    min_value: 0
    max_value: 5
    entity_category: config
    mode: slider

button:
  - platform: restart
    name: "Restart"
